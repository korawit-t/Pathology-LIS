name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lis_test
          POSTGRES_PASSWORD: lis_test
          POSTGRES_DB: pathology_lis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://lis_test:lis_test@localhost:5432/pathology_lis_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install system dependencies (weasyprint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run vitest
        working-directory: frontend
        run: npm test

  frontend-quality:
    name: Frontend Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      # Blocking gates: tree is clean (0 tsc errors, 0 eslint errors).
      - name: Type-check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint
