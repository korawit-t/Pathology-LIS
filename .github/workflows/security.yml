name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday 02:00 UTC
    - cron: "0 2 * * 1"

jobs:
  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: |
          grep -vE "^openslide" backend/requirements.txt > /tmp/requirements_for_audit.txt
          pip-audit -r /tmp/requirements_for_audit.txt --ignore-vuln PYSEC-2022-43012 --ignore-vuln CVE-2024-23342

  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        # his_adapters stays excluded: its raw-SQL sites are multiline f-strings that
        # can't carry a working inline `# nosec`. Semgrep (below) scans that folder instead;
        # the real fix is the bindparam(expanding=True) refactor (audit H5/M4).
        run: bandit -r backend/app -ll -x backend/app/tests,backend/app/his_adapters

  node-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install semgrep
        run: pip install semgrep
      # Covers FastAPI + React + raw SQL (his_adapters) that bandit rules miss.
      # `--error` = fail the build on findings. First run may surface existing issues
      # (e.g. the his_adapters SQL, pdf_service autoescape) — triage with `# nosemgrep`
      # or a `.semgrepignore`, or switch to SARIF-upload mode if you'd rather not block.
      - name: Run semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --error --metrics off \
            --exclude frontend/node_modules \
            --exclude backend/.venv \
            --exclude backend/venv
